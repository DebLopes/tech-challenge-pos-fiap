apiVersion: batch/v1
kind: Job
metadata:
  name: api-migration
  namespace: tech-challenge-namespace
  labels:
    app.kubernetes.io/name: api-migration
    app.kubernetes.io/part-of: tech-challenge-pos-fiap
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-migration
        app.kubernetes.io/part-of: tech-challenge-pos-fiap
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongo 27017; do echo "aguardando mongo..."; sleep 2; done
      containers:
        - name: migrate
          image: tech-challenge-api:migrations
          imagePullPolicy: IfNotPresent
          command:
            - yarn
            - migrate:up
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
