# O Docker Compose lê o ficheiro .env na raiz do repositório (mesma pasta que este ficheiro)
# para substituir ${JWT_SECRET} e ${SEED_ADMIN_PASSWORD} no serviço api.
# Antes de: docker compose up -d --build (com a api), cria .env a partir de .env.example
# e preenche pelo menos JWT_SECRET e SEED_ADMIN_PASSWORD (não vazios).
# Para subir só o Mongo: docker compose up -d mongo — não precisas destes segredos para a api.

services:
  api:
    build:
      context: .
      target: development
    container_name: api
    working_dir: /app
    command: sh -c "yarn install && yarn start:dev"
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/techChallenge
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@local.dev}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_ADMIN_NAME=${SEED_ADMIN_NAME:-Admin local}
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodbdata:/data/db

volumes:
  mongodbdata:
