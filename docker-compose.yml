services:
  api:
    build:
      context: .
      target: development
    container_name: api
    working_dir: /app
    command: sh -c "yarn install && yarn start:dev"
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongo:27017/techChallenge
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@local.dev}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_ADMIN_NAME=${SEED_ADMIN_NAME:-Admin local}
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:7.0.21
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodbdata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodbdata: