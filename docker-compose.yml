services:
  api:
    build:
      context: .
      target: development
    container_name: api
    working_dir: /app
    # node_modules em volume anônimo: garantir CLI e módulos nativos (ex.: bcrypt) no Linux
    command: sh -c "yarn install && yarn start:dev"
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/techChallenge
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_EXPIRES_IN=1d
      - SEED_ADMIN_EMAIL=admin@local.dev
      - SEED_ADMIN_PASSWORD=admin123
      - SEED_ADMIN_NAME=Admin local
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodbdata:/data/db

volumes:
  mongodbdata:
