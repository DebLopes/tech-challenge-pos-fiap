name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URL: mongodb://127.0.0.1:27017/tech-challenge-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: yarn test:integration
      - run: yarn build
