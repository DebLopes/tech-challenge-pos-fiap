name: CD

on:
  push:
    branches: [main, master, fase-02]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CLUSTER_NAME: tech-challenge
  NAMESPACE: tech-challenge-namespace
  API_IMAGE: tech-challenge-api:latest
  MIGRATIONS_IMAGE: tech-challenge-api:migrations

jobs:
  # =====================================================
  # 1) Testes e build da aplicação (gate do deploy)
  # =====================================================
  test:
    name: Testes + build
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URL: mongodb://127.0.0.1:27017/tech-challenge-integration
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: yarn test:integration
      - run: yarn build

  # =====================================================
  # 2) Build das imagens Docker (production + migrations)
  # =====================================================
  build-images:
    name: Build das imagens Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem de produção (API)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          tags: ${{ env.API_IMAGE }}
          load: true
          outputs: type=docker,dest=/tmp/api-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imagem de migrations (Job)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrations
          tags: ${{ env.MIGRATIONS_IMAGE }}
          load: true
          outputs: type=docker,dest=/tmp/migrations-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Guardar imagens como artefatos
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/api-image.tar
            /tmp/migrations-image.tar
          retention-days: 1

  # =====================================================
  # 3) Provisiona o cluster (Terraform + Kind) e faz deploy
  # =====================================================
  deploy:
    name: Provisiona (Terraform/Kind) + deploy K8s
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v5

      - name: Baixar imagens Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Carregar imagens no Docker local do runner
        run: |
          docker load --input /tmp/api-image.tar
          docker load --input /tmp/migrations-image.tar
          docker images | grep tech-challenge-api

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Instalar Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: Terraform apply (cria cluster Kind + namespace + metrics-server)
        working-directory: infra
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Configurar KUBECONFIG
        run: |
          kind export kubeconfig --name "$CLUSTER_NAME"
          kubectl cluster-info
          kubectl get nodes

      - name: Carregar imagens no cluster Kind
        run: |
          kind load docker-image "$API_IMAGE" --name "$CLUSTER_NAME"
          kind load docker-image "$MIGRATIONS_IMAGE" --name "$CLUSTER_NAME"

      - name: Aplicar config (namespace, ConfigMap, Secret)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Subir MongoDB
        run: |
          kubectl apply -f k8s/mongo-pvc.yaml
          kubectl apply -f k8s/mongo-service.yaml
          kubectl apply -f k8s/mongo-deployment.yaml
          kubectl rollout status deployment/mongo -n "$NAMESPACE" --timeout=180s

      - name: Rodar migrations (Job)
        run: |
          kubectl delete job api-migration -n "$NAMESPACE" --ignore-not-found
          kubectl apply -f k8s/migration-job.yaml
          kubectl wait --for=condition=complete job/api-migration -n "$NAMESPACE" --timeout=180s \
            || (kubectl logs job/api-migration -n "$NAMESPACE" --all-containers; exit 1)

      - name: Deploy da API + HPA
        run: |
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/api-service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl rollout status deployment/api -n "$NAMESPACE" --timeout=180s

      - name: Smoke test (/health/live e /health/ready)
        run: |
          kubectl port-forward svc/api 8080:80 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5
          echo "== /health/live =="
          curl -fsS http://localhost:8080/health/live | tee /tmp/live.json
          echo
          echo "== /health/ready =="
          curl -fsS http://localhost:8080/health/ready | tee /tmp/ready.json
          echo
          kill $PF_PID || true
          grep -q '"status":"ok"' /tmp/live.json
          grep -q '"status":"ok"' /tmp/ready.json

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          kubectl get all -n "$NAMESPACE" || true
          kubectl describe pods -n "$NAMESPACE" || true
          kubectl logs -l app.kubernetes.io/name=api -n "$NAMESPACE" --all-containers --tail=100 || true

      - name: Teardown (destrói o cluster)
        if: always()
        working-directory: infra
        run: terraform destroy -auto-approve -input=false || true
